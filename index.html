<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cumpleaños 🎂</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    h2{
      text-align: center;
      color: black;
      font-weight: 100;
      }
  </style>
</head>
<body>
  <div class="page">
    <div class="banner">🎉 Ana Bárbara 🎂</div>
    <h2 class="">¡Feliz cumpleaños, Ana Bárbara! selecciona una carta</h2>
    <div class="hub-grid" id="hubGrid"></div>
  </div>

  <script src="shared.js"></script>
  <script>
    /* ============================================================
       PERSONAS — agrega aquí cada nueva carta
       ============================================================ */
    const PERSONAS = [
      {
        emoji:    '🩺',
        name:     'Ana Bárbara',
        sub:      'De parte de Miguel',
        page:     'pages/miguel-ana.html',
        delay:    '0s',
      },
      {
        emoji:    '🎓',
        name:     'Ana Bárbara',
        sub:      'De parte de Rosmary',
        page:     'pages/ross-ana.html',
        delay:    '0.1s',
      },
      /* --- Ejemplo de cómo agregar otra persona ---
      
      */
    ];
    /* ============================================================ */

    const grid = document.getElementById('hubGrid');
    PERSONAS.forEach((p, i) => {
      const a = document.createElement('a');
      a.className = 'hub-card';
      a.href      = p.page;
      a.style.animationDelay = `${i * 0.1}s`;
      a.innerHTML = `
        <span class="hub-card__emoji">${p.emoji}</span>
        <span class="hub-card__name">${p.name}</span>
        <span class="hub-card__sub">${p.sub}</span>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
